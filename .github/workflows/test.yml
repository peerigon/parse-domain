name: 🧪 Test

on:
  push:
    branches:
      - main
      - beta
  pull_request: {}
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/beta' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # main
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: 🗄 Cache node_modules
        id: cache-node_modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # main
        with:
          path: "**/node_modules"
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🗄 Cache .eslintcache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # main
        with:
          path: .eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🔍 Install dependencies
        if: steps.cache-node_modules.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit

      - name: 🧪 Run tests
        env:
          CI: true
        run: |
          npm test
